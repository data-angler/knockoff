name = "knockoff-reports"
main = "worker.js"
compatibility_date = "2026-07-01"

# Custom domain — Cloudflare creates the DNS record and cert automatically.
# The zone root (knockoff.shopping) stays free for the marketing site.
# workers.dev is intentionally off: one canonical URL. (Self-hosters without
# a domain: delete the routes block and workers_dev line — the workers.dev
# default works, /brands just serves uncached there.)
workers_dev = false
routes = [
  { pattern = "api.knockoff.shopping", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "knockoff-reports"
database_id = "473acb60-dd1a-483e-ab3c-b674c49fcfe6"
