<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="frames.css">
<style>
  body{width:1280px;height:800px}
  .frame{align-items:center;justify-content:center;text-align:center;position:relative}
  h1{max-width:820px}
  .marks{display:flex;gap:16px;justify-content:center;margin-bottom:36px}
  .facts{display:flex;gap:18px;justify-content:center;margin-top:44px}
  .fact{background:#1c1c20;border:1px solid #2e2e33;border-radius:14px;padding:20px 30px;min-width:200px}
  .fact b{display:block;font:700 26px/1.2 var(--display);letter-spacing:-.02em;color:#fff}
  .fact span{font-size:13px;color:#a1a1aa}
</style>
</head><body class="dark">
<div class="frame">
  <div class="marks">
    <svg width="88" height="88" viewBox="0 0 128 128"><rect width="128" height="128" rx="30" fill="#1c1c20"/><rect x="1.5" y="1.5" width="125" height="125" rx="28.5" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="3"/><g transform="translate(64 66) scale(4.35) translate(-12 -12)"><path d="M12.9 2.6 21.4 11.1a2 2 0 0 1 0 2.83l-7.47 7.47a2 2 0 0 1-2.83 0L2.6 12.9A2 2 0 0 1 2 11.49V4a2 2 0 0 1 2-2h7.49a2 2 0 0 1 1.41.6Z" fill="#fff"/><circle cx="6.9" cy="6.9" r="1.55" fill="#1c1c20"/><path d="M4.6 21 21 4.6" stroke="#dc2626" stroke-width="2.4" stroke-linecap="round" fill="none"/></g></svg>
  </div>
  <h1 style="color:#fff">Private by design.<br>Fair source by default.</h1>
  <div class="facts">
    <div class="fact"><b>0</b><span>trackers, analytics, accounts</span></div>
    <div class="fact"><b>1</b><span>network request — a daily list refresh</span></div>
    <div class="fact"><b>FSL</b><span>licensed — MIT after two years</span></div>
  </div>
</div>
</body></html>
