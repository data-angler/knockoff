<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="frames.css">
<style>
  body{width:1400px;height:560px}
  .frame{flex-direction:row;align-items:center;gap:80px;padding:0 96px;position:relative;overflow:hidden}
  .frame::before{content:"";position:absolute;right:-90px;top:-90px;width:360px;height:360px;background:var(--red);transform:rotate(45deg);border-radius:64px;opacity:.92}
  h1{color:#fff;font-size:64px;max-width:640px;position:relative}
  h1 .slashed{position:relative;white-space:nowrap}
  h1 .slashed::after{content:"";position:absolute;left:-2%;right:-2%;top:54%;height:.09em;background:var(--red);border-radius:99px;transform:rotate(-6deg)}
  .sub{position:relative}
  .chips{display:flex;flex-direction:column;gap:16px;position:relative}
  .chip{transform:scale(1.35);transform-origin:left center}
</style>
</head><body class="dark">
<div class="frame">
  <div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:28px">
      <svg width="56" height="56" viewBox="0 0 128 128"><rect width="128" height="128" rx="30" fill="#1c1c20"/><rect x="1.5" y="1.5" width="125" height="125" rx="28.5" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="3"/><g transform="translate(64 66) scale(4.35) translate(-12 -12)"><path d="M12.9 2.6 21.4 11.1a2 2 0 0 1 0 2.83l-7.47 7.47a2 2 0 0 1-2.83 0L2.6 12.9A2 2 0 0 1 2 11.49V4a2 2 0 0 1 2-2h7.49a2 2 0 0 1 1.41.6Z" fill="#fff"/><circle cx="6.9" cy="6.9" r="1.55" fill="#1c1c20"/><path d="M4.6 21 21 4.6" stroke="#dc2626" stroke-width="2.4" stroke-linecap="round" fill="none"/></g></svg>
      <span style="font:700 28px/1 var(--display);letter-spacing:-.02em;color:#fff">Knockoff</span>
    </div>
    <h1>Amazon, without the <span class="slashed">knockoffs</span>.</h1>
    <p class="sub">Free &amp; fair source · knockoff.shopping</p>
  </div>
  <div class="chips">
    <span class="chip red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.9 2.6 21.4 11.1a2 2 0 0 1 0 2.83l-7.47 7.47a2 2 0 0 1-2.83 0L2.6 12.9A2 2 0 0 1 2 11.49V4a2 2 0 0 1 2-2h7.49a2 2 0 0 1 1.41.6Z"/><circle cx="7.5" cy="7.5" r="1.5" fill="currentColor" stroke="none"/><path d="M4.2 21.5 21.5 4.2"/></svg>VRLKZOP</span>
    <span class="chip amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13.73 4.4 21.6 18a2 2 0 0 1-1.73 3H4.13A2 2 0 0 1 2.4 18L10.27 4.4a2 2 0 0 1 3.46 0Z"/><path d="M12 9.4v4.2"/><circle cx="12" cy="17.2" r="1.1" fill="currentColor" stroke="none"/></svg>No brand</span>
    <span class="chip green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.4 12.4 2.5 2.5 4.9-5.4"/></svg>Halverson &amp; Sons</span>
  </div>
</div>
</body></html>
