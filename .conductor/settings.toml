"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

# Files copied from the root repo into each new workspace. Setting this
# replaces Conductor's default (.env*), so the env files are re-listed.
# Only gitignored, untracked files are eligible.
file_include_globs = """
.env.amo
.env.asc
.env.cws
"""
